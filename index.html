<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kevin's English Lessons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F0E8;
  --bg2:#FFFFFF;
  --bg3:#FDFAF5;
  --bg4:#F0EAE0;
  --text:#2C2018;
  --text2:#6B5A45;
  --text3:#A0896E;
  --border:rgba(180,140,90,0.15);
  --border2:rgba(180,140,90,0.28);
  --gold:#B87D2A;
  --gold2:#C8920A;
  --green-bg:rgba(60,160,90,0.1);
  --green-text:#2E7D4F;
  --amber-bg:rgba(220,120,30,0.1);
  --amber-text:#B85A00;
  --radius:10px;
  --radius-lg:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.hero{width:100%;overflow:hidden;display:block;line-height:0;}
.hero svg{display:block;width:100%;height:auto;}

.sync-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#FFF8EE;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border2);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#3aaa6e;flex-shrink:0;transition:background 0.3s;}
.sync-dot.syncing{background:#e6a03c;animation:pulse 1s infinite;}
.sync-dot.error{background:#e8453c;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.sync-time{margin-left:auto;color:var(--text3);font-size:11px;}
.refresh-btn{font-size:12px;padding:3px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;}
.refresh-btn:hover{background:var(--bg4);}

.tabs{display:flex;background:#FFF8EE;border-bottom:1px solid var(--border2);}
.tab{flex:1;padding:11px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;background:transparent;color:var(--text3);border:none;transition:all 0.15s;position:relative;}
.tab.active{color:var(--gold);}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:2px 2px 0 0;}

.content{padding:1rem;}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.stat-wide{grid-column:1/-1;}
.stat-card{background:var(--bg3);border-radius:var(--radius-lg);padding:14px 16px;border:1px solid var(--border);}
.stat-card.gold-accent{border-color:rgba(201,168,76,0.3);}
.stat-card.warn{background:var(--amber-bg);border-color:rgba(230,160,60,0.25);}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.stat-card.warn .stat-label{color:var(--amber-text);opacity:0.8;}
.stat-value{font-family:'Playfair Display',serif;font-size:26px;color:var(--text);}
.stat-card.warn .stat-value{color:var(--amber-text);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.stat-card.warn .stat-sub{color:var(--amber-text);opacity:0.7;}

.section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin:0 0 10px;padding:0 2px;}

.month-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}
.month-header{display:flex;align-items:center;padding:13px 14px;cursor:pointer;gap:9px;user-select:none;-webkit-tap-highlight-color:transparent;}
.month-header:active{background:var(--bg4);}
.month-col{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
.month-name{font-size:14px;font-weight:500;color:var(--text);}
.month-detail{font-size:11px;color:var(--text3);}
.month-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.month-amount{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold2);}
.paid-pill{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap;}
.paid-yes{background:var(--green-bg);color:var(--green-text);}
.paid-no{background:var(--amber-bg);color:var(--amber-text);}
.chevron{font-size:12px;color:var(--text3);transition:transform 0.2s;margin-left:2px;flex-shrink:0;}
.chevron.open{transform:rotate(180deg);}

.session-list{border-top:1px solid var(--border);display:none;}
.session-list.open{display:block;}
.session-row{display:flex;align-items:center;padding:10px 14px;font-size:13px;gap:10px;border-bottom:1px solid var(--border);}
.session-row:last-child{border-bottom:none;}
.session-date{color:var(--text2);width:90px;flex-shrink:0;font-size:12px;}
.session-mins{color:var(--text);flex:1;}
.session-fee{color:var(--gold);font-size:12px;min-width:55px;text-align:right;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:4px 7px;border-radius:6px;-webkit-tap-highlight-color:transparent;}
.del-btn:active{background:rgba(232,69,60,0.15);color:#e8453c;}

.paid-action{padding:10px 14px;border-top:1px solid var(--border);background:var(--bg4);}
.mark-paid-btn{width:100%;padding:9px;border-radius:var(--radius);border:1px solid var(--border2);background:white;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.mark-paid-btn.is-paid{color:var(--text3);}
.mark-paid-btn:active{background:var(--bg4);}

.form-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;}
.form-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.field label{font-size:12px;color:var(--text2);}
.field input{padding:11px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:15px;background:white;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;}
.field input:focus{border-color:var(--gold);}
.rate-row{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--bg4);border-radius:var(--radius);font-size:13px;color:var(--text2);margin-bottom:12px;}
.rate-row span{flex:1;}
.rate-input{width:60px;padding:6px 8px;border:1px solid var(--border2);border-radius:8px;font-size:14px;text-align:center;background:white;color:var(--text);font-family:'DM Sans',sans-serif;}
.submit-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--gold);color:white;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.submit-btn:active{opacity:0.85;}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed;}
.note{font-size:11px;color:var(--text3);margin-top:10px;line-height:1.6;}

.view-all{width:100%;padding:12px;text-align:center;font-size:13px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.view-all:active{color:var(--text2);}
.loading{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;}
</style>
</head>

let state={rate:12,months:[]};

function setSyncUI(status,msg){
  document.getElementById('sync-dot').className='sync-dot'+(status==='syncing'?' syncing':status==='error'?' error':'');
  document.getElementById('sync-status').textContent=msg;
}
function setSyncTime(){document.getElementById('sync-time').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});}

async function saveData(){
  setSyncUI('syncing','Saving…');
  try{await set(dataRef,state);setSyncUI('ok','Synced — shared with Kevin');setSyncTime();}
  catch(e){setSyncUI('error','Save failed');}
}

window.forceRefresh=async function(){
  setSyncUI('syncing','Refreshing…');
  try{const s=await get(dataRef);if(s.exists()){state=s.val();render();}setSyncUI('ok','Synced — shared with Kevin');setSyncTime();}
  catch(e){setSyncUI('error','Refresh failed');}
};
window.togglePaid=async function(ym){const m=state.months.find(x=>x.ym===ym);if(m){m.paid=!m.paid;render();await saveData();}};
window.deleteSession=async function(ym,idx){const m=state.months.find(x=>x.ym===ym);if(!m)return;m.sessions.splice(idx,1);if(!m.sessions.length)state.months=state.months.filter(x=>x.ym!==ym);render();await saveData();};
window.updateRate=async function(v){state.rate=parseInt(v)||12;render();await saveData();};
window.addLesson=async function(){
  const dateEl=document.getElementById('new-date'),minsEl=document.getElementById('new-mins');
  const date=dateEl.value,mins=parseInt(minsEl.value);
  if(!date||!mins||mins<1)return;
  const btn=document.getElementById('add-btn');btn.disabled=true;
  const ym=date.substring(0,7);
  let month=state.months.find(x=>x.ym===ym);
  if(!month){month={ym,paid:false,sessions:[]};state.months.push(month);state.months.sort((a,b)=>a.ym.localeCompare(b.ym));}
  month.sessions.push({date,mins});month.sessions.sort((a,b)=>a.date.localeCompare(b.date));
  dateEl.value='';minsEl.value='';render();await saveData();btn.disabled=false;
};

function calcTotal(m){return m.sessions.reduce((s,x)=>s+x.mins*state.rate,0);}
function calcMins(m){return m.sessions.reduce((s,x)=>s+x.mins,0);}
function fmtYM(ym){const[y,mo]=ym.split('-');return`${y}年${parseInt(mo)}月`;}

window.toggleExpand=function(ym){
  const el=document.getElementById('sl-'+ym),ch=document.getElementById('ch-'+ym);
  if(!el)return;
  const open=el.classList.contains('open');
  el.classList.toggle('open',!open);
  if(ch)ch.className='chevron'+(open?'':' open');
};

function monthCard(m,expanded){
  const total=calcTotal(m),mins=calcMins(m);
  const rows=m.sessions.map((s,i)=>`
    <div class="session-row">
      <span class="session-date">${s.date}</span>
      <span class="session-mins">${s.mins} min</span>
      <span class="session-fee">¥${(s.mins*state.rate).toLocaleString()}</span>
      <button class="del-btn" onclick="deleteSession('${m.ym}',${i})">✕</button>
    </div>`).join('');
  return`<div class="month-card">
    <div class="month-header" onclick="toggleExpand('${m.ym}')">
      <div class="month-col">
        <span class="month-name">${fmtYM(m.ym)}</span>
        <span class="month-detail">${m.sessions.length} sessions · ${mins} min</span>
      </div>
      <div class="month-right">
        <span class="month-amount">¥${total.toLocaleString()}</span>
        <span class="paid-pill ${m.paid?'paid-yes':'paid-no'}">${m.paid?'Paid ✓':'Unpaid'}</span>
      </div>
      <span class="chevron${expanded?' open':''}" id="ch-${m.ym}">▾</span>
    </div>
    <div class="session-list${expanded?' open':''}" id="sl-${m.ym}">${rows}</div>
    <div class="paid-action">
      <button class="mark-paid-btn${m.paid?' is-paid':''}" onclick="togglePaid('${m.ym}')">${m.paid?'Mark as unpaid':'Mark as paid'}</button>
    </div>
  </div>`;
}

function render(){
  const el=document.getElementById('rate-input');if(el)el.value=state.rate;
  const sorted=[...state.months].sort((a,b)=>b.ym.localeCompare(a.ym));
  const totalMins=state.months.reduce((s,m)=>s+calcMins(m),0);
  const totalPaid=state.months.filter(m=>m.paid).reduce((s,m)=>s+calcTotal(m),0);
  const totalUnpaid=state.months.filter(m=>!m.paid).reduce((s,m)=>s+calcTotal(m),0);
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card gold-accent">
      <div class="stat-label">Total lessons</div>
      <div class="stat-value">${state.months.reduce((s,m)=>s+m.sessions.length,0)}</div>
      <div class="stat-sub">${totalMins.toLocaleString()} min · ${state.months.length} months</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total paid</div>
      <div class="stat-value">¥${totalPaid.toLocaleString()}</div>
      <div class="stat-sub">${state.months.filter(m=>m.paid).length} months cleared</div>
    </div>
    <div class="stat-card warn stat-wide">
      <div class="stat-label">Unpaid balance</div>
      <div class="stat-value">¥${totalUnpaid.toLocaleString()}</div>
      <div class="stat-sub">${state.months.filter(m=>!m.paid).length} months pending payment</div>
    </div>`;
  document.getElementById('recent-months').innerHTML=sorted.slice(0,3).map(m=>monthCard(m,false)).join('');
  document.getElementById('all-months').innerHTML=sorted.map((m,i)=>monthCard(m,i===0)).join('');
}

window.showTab=function(tab){
  ['summary','history','add'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?'block':'none';});
  document.querySelectorAll('.tab').forEach((el,i)=>{el.className='tab'+(['summary','history','add'][i]===tab?' active':'');});
};

document.getElementById('new-date').valueAsDate=new Date();
setSyncUI('syncing','Connecting…');
onValue(dataRef,(snap)=>{
  state=snap.exists()?snap.val():JSON.parse(JSON.stringify(initialData));
  if(!snap.exists())set(dataRef,state);
  render();setSyncUI('ok','Synced — shared with Kevin');setSyncTime();
},(err)=>{setSyncUI('error','Connection failed');state=JSON.parse(JSON.stringify(initialData));render();});
</script>
